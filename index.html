<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAWAT REDDY | ASTRO CRICKET</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@400;600&display=swap');
*{font-family:Poppins;}

body{
min-height:100vh;
background:radial-gradient(circle at top,#0f172a,#020617,#000);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.card{
position:relative;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(25px);
border-radius:30px;
padding:32px;
width:100%;
max-width:440px;
text-align:center;
border:2px solid transparent;
background-clip:padding-box;
box-shadow:0 0 40px cyan,0 0 120px magenta;
animation:float 6s ease-in-out infinite;
}

.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:30px;
background:linear-gradient(120deg,#00ffff,#ff00ff,#00ffcc);
z-index:-1;
animation:borderMove 6s linear infinite;
}

@keyframes borderMove{
0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-14px)}
}

.logo{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #00ffff;
box-shadow:0 0 30px cyan,0 0 100px magenta;
margin:auto;
}

.badge{
margin-top:15px;
background:linear-gradient(90deg,#00ffcc,#ff00ff);
padding:8px 24px;
border-radius:50px;
font-weight:bold;
color:black;
display:inline-block;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px cyan}
50%{box-shadow:0 0 30px magenta}
100%{box-shadow:0 0 10px cyan}
}

.title{
font-family:Orbitron;
font-size:36px;
margin-top:15px;
background:linear-gradient(90deg,#00ffcc,#ff00ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
color:#facc15;
letter-spacing:3px;
margin-bottom:14px;
}

.stats p{
margin:7px 0;
font-size:18px;
color:white;
}

.join{
margin-top:24px;
padding:18px;
border-radius:60px;
font-size:22px;
font-weight:bold;
background:linear-gradient(135deg,#00ffcc,#ff00ff);
color:black;
box-shadow:0 0 35px cyan;
transition:.3s;
}

.join:hover{
transform:scale(1.15);
box-shadow:0 0 70px magenta;
}

.footer{
margin-top:14px;
font-size:14px;
color:#ffcccc;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.jpg" class="logo">

<div class="badge">🔥 LIVE ASTRO MATCH TIPS</div>

<h1 class="title">RAWAT REDDY</h1>
<p class="subtitle">PREMIUM CRICKET PREDICTIONS</p>

<div class="stats mb-4">
<p>🏆 Accuracy Rate : <span class="text-green-400">92%</span></p>
<p>⭐ 12+ Years Experience</p>
<p>👥 Members Joined: <span id="counter" class="text-pink-400">10234</span></p>
<p>⚡ Trusted by Thousands</p>
</div>

<a href="https://t.me/+nDBFl18R235kMzdl" target="_blank" class="join block">
<i class="fab fa-telegram"></i> JOIN TELEGRAM CHANNEL
</a>

<p id="redirectText" class="footer"></p>

</div>

<script>
confetti({particleCount:300,spread:140});

let count=10234;
setInterval(()=>{
count++;
document.getElementById("counter").innerText=count;
},1800);

let sec=8;
let timer=setInterval(()=>{
document.getElementById("redirectText").innerText="Redirecting in "+sec+" seconds...";
sec--;
if(sec<0){
clearInterval(timer);
window.location.href="https://t.me/+nDBFl18R235kMzdl";
}
},1000);
</script>

</body>
</html>
