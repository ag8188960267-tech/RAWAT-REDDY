<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Poppins:wght@400;600&display=swap');
*{font-family:Poppins;}

body{
  min-height:100vh;
  background:radial-gradient(circle at top,#0f172a,#020617,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.card{
  position:relative;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:32px;
  width:100%;
  max-width:440px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 15px cyan,0 0 30px magenta;
  animation:float 6s ease-in-out infinite;
}

.card::before{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:30px;
  background:linear-gradient(120deg,#00ffff,#ff00ff,#00ffcc);
  z-index:-1;
  opacity:0.5;
  animation:borderMove 10s linear infinite;
}

@keyframes borderMove{
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(360deg);}
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.badge{
  margin-top:10px;
  background:linear-gradient(90deg,#00ffcc,#ff00ff);
  padding:8px 24px;
  border-radius:50px;
  font-weight:bold;
  color:black;
  display:inline-block;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px cyan}
  50%{box-shadow:0 0 15px magenta}
  100%{box-shadow:0 0 5px cyan}
}

.title{
  font-family:Orbitron;
  font-size:36px;
  margin-top:20px;
  background:linear-gradient(90deg,#00ffcc,#ff00ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:#facc15;
  letter-spacing:2px;
  margin-bottom:14px;
}

.stats p{
  margin:6px 0;
  font-size:18px;
  color:white;
}

.join{
  margin-top:24px;
  padding:16px;
  border-radius:60px;
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(135deg,#00ffcc,#ff00ff);
  color:black;
  box-shadow:0 0 20px cyan;
  transition:.3s;
}

.join:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px magenta;
}

.footer{
  margin-top:14px;
  font-size:14px;
  color:#ffcccc;
}
</style>
